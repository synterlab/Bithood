<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#060810"/>

  <!-- Outer chip border -->
  <rect x="10" y="10" width="44" height="44" rx="4" stroke="#00ff87" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Corner notch marks -->
  <path d="M10 18 L10 10 L18 10" stroke="#00ff87" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M46 10 L54 10 L54 18" stroke="#00ff87" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M54 46 L54 54 L46 54" stroke="#00ff87" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M18 54 L10 54 L10 46" stroke="#00ff87" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

  <!-- SM grid (4x4 shader multiprocessors) -->
  <!-- Row 1 -->
  <rect x="16" y="16" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.85"/>
  <rect x="25" y="16" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.5"/>
  <rect x="34" y="16" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.7"/>
  <rect x="43" y="16" width="5" height="7" rx="1.5" fill="#00ff87" opacity="0.4"/>

  <!-- Row 2 -->
  <rect x="16" y="25" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.4"/>
  <rect x="25" y="25" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.9"/>
  <rect x="34" y="25" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.3"/>
  <rect x="43" y="25" width="5" height="7" rx="1.5" fill="#00ff87" opacity="0.7"/>

  <!-- Row 3 -->
  <rect x="16" y="34" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.6"/>
  <rect x="25" y="34" width="7" height="7" rx="1.5" fill="#00ff87" opacity="0.35"/>
  <rect x="34" y="34" width="7" height="7" rx="1.5" fill="#00ff87" opacity="1"/>
  <rect x="43" y="34" width="5" height="7" rx="1.5" fill="#00ff87" opacity="0.55"/>

  <!-- Row 4 -->
  <rect x="16" y="43" width="7" height="5" rx="1.5" fill="#00ff87" opacity="0.3"/>
  <rect x="25" y="43" width="7" height="5" rx="1.5" fill="#00ff87" opacity="0.65"/>
  <rect x="34" y="43" width="7" height="5" rx="1.5" fill="#00ff87" opacity="0.4"/>
  <rect x="43" y="43" width="5" height="5" rx="1.5" fill="#00ff87" opacity="0.8"/>

  <!-- Central glow -->
  <circle cx="32" cy="32" r="5" fill="#00ff87" opacity="0.15"/>
  <circle cx="32" cy="32" r="2" fill="#00ff87" opacity="0.6"/>

  <!-- Pin legs top -->
  <line x1="20" y1="10" x2="20" y2="6" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="10" x2="28" y2="6" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="10" x2="36" y2="6" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="10" x2="44" y2="6" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Pin legs bottom -->
  <line x1="20" y1="54" x2="20" y2="58" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="54" x2="28" y2="58" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="54" x2="36" y2="58" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="54" x2="44" y2="58" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Pin legs left -->
  <line x1="10" y1="20" x2="6" y2="20" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="28" x2="6" y2="28" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="36" x2="6" y2="36" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="44" x2="6" y2="44" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Pin legs right -->
  <line x1="54" y1="20" x2="58" y2="20" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="54" y1="28" x2="58" y2="28" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="54" y1="36" x2="58" y2="36" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="54" y1="44" x2="58" y2="44" stroke="#00ff87" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
